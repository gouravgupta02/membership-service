spring.application.name=membership-service

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:membership_db}
spring.datasource.username=${DB_USER:membership_user}
spring.datasource.password=${DB_PASSWORD:membership_pass}

# validate = Hibernate checks entities match the Flyway-managed schema, never modifies it
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_batch_fetch_size=10

spring.flyway.baseline-on-migrate=true

server.port=${PORT:8080}
server.servlet.context-path=/membership-service

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.display-request-duration=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

membership.rules.order-count.gold-threshold=5
membership.rules.order-count.platinum-threshold=20
membership.rules.monthly-spend.gold-threshold=2000
membership.rules.monthly-spend.platinum-threshold=10000
membership.rules.cohort.gold-cohorts=VIP
membership.rules.cohort.platinum-cohorts=CORPORATE

membership.scheduler.expiry-cron=0 0 * * * *
membership.scheduler.tier-upgrade-cron=0 0 2 * * *
membership.scheduler.batch-size=500
