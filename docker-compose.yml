services:
  postgres:
    image: postgres:16-alpine
    container_name: membership-postgres
    environment:
      POSTGRES_DB: membership_db
      POSTGRES_USER: membership_user
      POSTGRES_PASSWORD: membership_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U membership_user -d membership_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  membership-service:
    build: .
    container_name: membership-service
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: membership_db
      DB_USER: membership_user
      DB_PASSWORD: membership_pass
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
